<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentilytics - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0ea5e9;
            --positive: #10b981;
            --negative: #ef4444;
            --neutral: #94a3b8;
            --bg-color-from: #e0f2fe;
            --bg-color-to: #f0f9ff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.5);
            --header-bg: rgba(255, 255, 255, 0.4);
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        .dark-mode {
            --primary: #3b82f6;
            --secondary: #38bdf8;
            --bg-color-from: #0f172a;
            --bg-color-to: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(15, 23, 42, 0.6);
            --text-dark: #f8fafc;
            --text-light: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color-from) 0%, var(--bg-color-to) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
            position: relative;
        }

        .header h1 {
            font-weight: 600;
            color: var(--primary);
            font-size: 2.5rem;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: transparent;
            border: none;
            color: var(--text-dark);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .theme-toggle:hover {
            color: var(--secondary);
            transform: scale(1.1);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .stat-card h3 {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 3rem;
            font-weight: 600;
        }

        .stat-card.positive .value {
            color: var(--positive);
        }

        .stat-card.negative .value {
            color: var(--negative);
        }

        .stat-card.neutral .value {
            color: var(--neutral);
        }
        
        .stat-card.total .value {
            color: var(--primary);
        }

        .charts-container {
            display: flex;
            gap: 2rem;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .chart-card h3 {
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .canvas-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .back-btn {
            margin-top: 2rem;
            margin-bottom: 4rem;
            padding: 1rem 2.5rem;
            background: var(--card-bg);
            color: var(--text-dark);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .back-btn:hover {
            border-color: var(--text-light);
            transform: translateY(-2px);
        }
        
    </style>
</head>
<body>

    <header class="header">
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <h1><i class="fas fa-chart-pie"></i> Sentilytics Dashboard</h1>
    </header>

    <div class="container">
        <!-- Summary Stats -->
        <div class="stats">
            <div class="stat-card total">
                <h3>Total Reviews</h3>
                <div class="value">{{ positive + negative + neutral }}</div>
            </div>
            <div class="stat-card positive">
                <h3><i class="fas fa-smile"></i> Positive</h3>
                <div class="value">{{ positive }}</div>
            </div>
            <div class="stat-card neutral">
                <h3><i class="fas fa-meh"></i> Neutral</h3>
                <div class="value">{{ neutral }}</div>
            </div>
            <div class="stat-card negative">
                <h3><i class="fas fa-frown"></i> Negative</h3>
                <div class="value">{{ negative }}</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-container">
            <div class="chart-card">
                <h3>Sentiment Distribution</h3>
                <div class="canvas-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Review Counts</h3>
                <div class="canvas-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Analyze More</a>
        
    </div>

    <script>
        // Data from Flask
        const positiveCount = {{ positive }};
        const neutralCount = {{ neutral }};
        const negativeCount = {{ negative }};
        
        // Theme logic
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        function applyDarkThemeToCharts() {
            Chart.defaults.color = '#cbd5e1'; // Lighter text for dark mode
        }
        
        function applyLightThemeToCharts() {
            Chart.defaults.color = '#1e293b'; // Darker text for light mode
        }

        let pieChart, barChart;

        function initCharts() {
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                applyDarkThemeToCharts();
            } else {
                applyLightThemeToCharts();
            }

            Chart.defaults.font.family = "'Outfit', sans-serif";

            // Initialize Pie Chart
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Positive', 'Neutral', 'Negative'],
                    datasets: [{
                        data: [positiveCount, neutralCount, negativeCount],
                        backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(148, 163, 184, 0.8)', 'rgba(239, 68, 68, 0.8)'],
                        borderColor: ['#10b981', '#94a3b8', '#ef4444'],
                        borderWidth: 2,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, font: { size: 14 } } } },
                    cutout: '65%'
                }
            });

            // Initialize Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['Positive', 'Neutral', 'Negative'],
                    datasets: [{
                        label: 'Number of Reviews',
                        data: [positiveCount, neutralCount, negativeCount],
                        backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(148, 163, 184, 0.8)', 'rgba(239, 68, 68, 0.8)'],
                        borderRadius: 8,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(128, 128, 128, 0.2)', drawBorder: false } },
                        x: { grid: { display: false, drawBorder: false } }
                    }
                }
            });
        }

        initCharts();

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            
            if (isDark) {
                localStorage.setItem('theme', 'dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                applyDarkThemeToCharts();
            } else {
                localStorage.setItem('theme', 'light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                applyLightThemeToCharts();
            }
            pieChart.update();
            barChart.update();
        });
    </script>
</body>
</html>
